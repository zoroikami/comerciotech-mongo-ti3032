server {
    listen 80;
    server_name comerciotech.qd.je;

    # Logs de acceso y error
    access_log /var/log/nginx/comerciotech_access.log;
    error_log /var/log/nginx/comerciotech_error.log;

    # Ruta para validación de certificados SSL de Let's Encrypt (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy inverso para la aplicación Flask
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ajustes para WebSockets o conexiones largas si fuese necesario
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Tiempos de espera
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Denegar acceso a archivos ocultos (como .git o .env) por seguridad
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
